<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Empleado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

    <h2 id="titulo">Crear Empleado</h2>

    <div class="card p-3">
        <input id="nombre" class="form-control mb-2" placeholder="Nombre">
        <input id="documento" class="form-control mb-2" placeholder="Documento">
        <input id="cargo" class="form-control mb-2" placeholder="Cargo">
        <input id="salarioBase" class="form-control mb-2" placeholder="Salario Base">
        <select id="estado" class="form-control mb-2">
            <option value="Activo">Activo</option>
            <option value="Inactivo">Inactivo</option>
        </select>
        <input id="fechaIngreso" type="date" class="form-control mb-2">


        <div class="text-center mt-3">
            <button onclick="guardar()" class="btn btn-primary me-2">Guardar</button>
            <a href="index.html" class="btn btn-secondary">Volver</a>
        </div>


    </div>

    <script>
        const API = "http://localhost:8080";
        const TOKEN = "Bearer 123456";
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        function headers() {
            return {
                "Content-Type": "application/json",
                "Authorization": TOKEN
            }
        }

        if (id) {
            titulo.innerText = "Editar Empleado";

            fetch(API + "/api/empleados/" + id, {
                headers: headers()
            })
                .then(res => res.json())
                .then(e => {
                    nombre.value = e.nombre;
                    documento.value = e.documento;
                    cargo.value = e.cargo;
                    salarioBase.value = e.salarioBase;
                    estado.value = e.estado;
                    fechaIngreso.value = e.fechaIngreso;
                });
        }

        function guardar() {

            const metodo = id ? "PUT" : "POST";
            const url = id ? API + "/api/empleados/" + id : API + "/api/empleados";

            fetch(url, {
                method: metodo,
                headers: headers(),
                body: JSON.stringify({
                    nombre: nombre.value,
                    documento: documento.value,
                    cargo: cargo.value,
                    salarioBase: parseFloat(salarioBase.value),
                    estado: estado.value,
                    fechaIngreso: fechaIngreso.value
                })
            }).then(() => window.location.href = "index.html");
        }
    </script>

</body>

</html>

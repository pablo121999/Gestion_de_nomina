<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Empleados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="container mt-4">

    <h2>Lista de Empleados</h2>

    <div class="col-md-12 text-end">
        <a href="empleado-form.html" class="btn btn-primary mb-3">Crear Empleado</a>
    </div>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Documento</th>
                <th>Cargo</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaEmpleados"></tbody>
    </table>

    <div>
        <button onclick="anterior()" class="btn btn-secondary">Anterior</button>
        <span id="paginaActual"></span>
        <button onclick="siguiente()" class="btn btn-secondary">Siguiente</button>
    </div>

    <div class="col-md-12 text-end">
        <a href="nomina.html" class="btn btn-success mb-3">Ir a Nómina</a>
    </div>

    <script>
        const API = "http://localhost:8080";
        const TOKEN = "Bearer 123456";

        let pagina = 0;

        function headers() {
            return {
                "Authorization": TOKEN
            }
        }

        function listar() {
            fetch(API + "/api/empleados?page=" + pagina + "&size=10", {
                headers: headers()
            })
                .then(res => res.json())
                .then(data => {

                    tablaEmpleados.innerHTML = "";

                    data.content.forEach(e => {
                        tablaEmpleados.innerHTML += `
                <tr>
                    <td>${e.id}</td>
                    <td>${e.nombre}</td>
                    <td>${e.documento}</td>
                    <td>${e.cargo}</td>
                    <td>
                        <a href="empleado-form.html?id=${e.id}" class="btn btn-warning btn-sm">Editar</a>
                        <button onclick="eliminar(${e.id})" class="btn btn-danger btn-sm">Eliminar</button>
                    </td>
                </tr>
            `;
                    });

                    paginaActual.innerHTML = "Página: " + (pagina + 1);
                });
        }

        function siguiente() {
            pagina++;
            listar();
        }

        function anterior() {
            if (pagina > 0) {
                pagina--;
                listar();
            }
        }


        function eliminar(id) {

            Swal.fire({
                title: "¿Estás seguro?",
                text: "No podrás revertir esta acción",
                icon: "warning",
                showCancelButton: true,
                confirmButtonText: "Sí, eliminar",
                cancelButtonText: "Cancelar"
            }).then((result) => {

                if (result.isConfirmed) {

                    fetch(API + "/api/empleados/" + id, {
                        method: "DELETE",
                        headers: headers()
                    })
                        .then(async response => {

                            if (!response.ok) {
                                const mensaje = await response.text();

                                Swal.fire({
                                    icon: "error",
                                    title: "No se puede eliminar",
                                    text: mensaje
                                });

                                return;
                            }

                            Swal.fire({
                                icon: "success",
                                title: "Eliminado correctamente",
                                showConfirmButton: false,
                                timer: 1500
                            });

                            listar();
                        })
                        .catch(() => {
                            Swal.fire({
                                icon: "error",
                                title: "Error",
                                text: "Error al eliminar el empleado"
                            });
                        });
                }

            });
        }



        listar();
    </script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Gestión Nómina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="container mt-4">

    <h2>Lista de Nómina</h2>

    <div class="text-end mb-3">
        <a href="nomina-form.html" class="btn btn-success">Crear Nómina</a>
        <a href="index.html" class="btn btn-secondary">Volver a Empleados</a>
    </div>

    <table class="table table-bordered table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Empleado</th>
                <th>Bonificaciones</th>
                <th>Deducciones</th>
                <th>Fecha Pago</th>
                <th>Salario Base</th>
                <th>Total Pagar</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaNomina"></tbody>
    </table>

    <div>
        <button onclick="anterior()" class="btn btn-secondary">Anterior</button>
        <span id="paginaActual"></span>
        <button onclick="siguiente()" class="btn btn-secondary">Siguiente</button>
    </div>

    <script>
        const API = "http://localhost:8080";
        const TOKEN = "Bearer 123456";

        let pagina = 0;

        function headers() {
            return {
                "Authorization": TOKEN
            }
        }

        function listar() {
            fetch(API + "/api/nomina?page=" + pagina + "&size=10", {
                headers: headers()
            })
                .then(res => res.json())
                .then(data => {

                    tablaNomina.innerHTML = "";

                    data.content.forEach(n => {
                        tablaNomina.innerHTML += `
                <tr>
                    <td>${n.id}</td>
                    <td>${n.empleado?.nombre ?? ''}</td>
                    <td>${n.bonificaciones}</td>
                    <td>${n.deducciones}</td>
                    <td>${n.fechaPago}</td>
                    <td>${n.salarioBase}</td>
                    <td><strong>${n.totalPagar}</strong></td>
                    <td>
                        <a href="nomina-form.html?id=${n.id}" class="btn btn-warning btn-sm">Editar</a>
                        <button onclick="eliminar(${n.id})" class="btn btn-danger btn-sm">Eliminar</button>
                    </td>
                </tr>
            `;
                    });

                    paginaActual.innerHTML = "Página: " + (pagina + 1);
                });
        }

        function siguiente() {
            pagina++;
            listar();
        }

        function anterior() {
            if (pagina > 0) {
                pagina--;
                listar();
            }
        }

        function eliminar(id) {

            Swal.fire({
                title: "¿Eliminar nómina?",
                text: "Esta acción no se puede deshacer",
                icon: "warning",
                showCancelButton: true,
                confirmButtonText: "Sí, eliminar",
                cancelButtonText: "Cancelar"
            }).then((result) => {

                if (result.isConfirmed) {

                    fetch(API + "/api/nomina/" + id, {
                        method: "DELETE",
                        headers: headers()
                    })
                        .then(response => {

                            if (!response.ok) {
                                throw new Error();
                            }

                            Swal.fire({
                                icon: "success",
                                title: "Nómina eliminada",
                                showConfirmButton: false,
                                timer: 1500
                            });

                            listar();
                        })
                        .catch(() => {
                            Swal.fire({
                                icon: "error",
                                title: "Error",
                                text: "No se pudo eliminar la nómina"
                            });
                        });

                }

            });
        }

        listar();
    </script>

</body>

</html>
